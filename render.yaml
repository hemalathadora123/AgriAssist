services:
  - type: web
    name: agriassist
    runtime: python

    plan: free

    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt

    startCommand: |
      streamlit run app/streamlit_app.py --server.port=$PORT --server.address=0.0.0.0

    envVars:
      - key: GEMINI_API_KEY
        sync: false